<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matéo Fernandez Bède - Portfolio</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="hero-section">
        
        <!-- Zone du logo typographique -->
        <div class="typography-container">
            <h1 class="brand-name">
                
                <!-- LIGNE 1 : Matéo -->
                <div class="line-top">
                    <span class="big-letter">M</span><span class="rest-word">atéo</span>
                </div>
                
                <!-- LIGNE 2 : Fernandez (Décalé pour que F soit sous le a) -->
                <div class="line-bottom">
                    <span class="big-letter">F</span><span class="rest-word">ernandez</span>
                </div>

                <!-- LIGNE 3 : Bède (Passé à la ligne et décalé pour que B soit sous le e) -->
                <div class="block-bede">
                    <span class="big-letter">B</span><span class="rest-word">ède</span>
                </div>

            </h1>
        </div>

        <!-- Zone de contenu -->
        <div class="content-container">
            <p class="tagline">
                Projects, Skills,<br>
                Hobbies, Map and Timeline.
            </p>
            
            <a href="projects.html" class="cta-button">
                More to see here
            </a>
        </div>

        <div class="scroll-indicator">
            <span class="arrow"></span>
        </div>

    </main>

    <footer class="bottom-bar"></footer>

</body>
</html>
